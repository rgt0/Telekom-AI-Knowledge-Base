    <script>
let kbData = [];

// Betöltjük a JSON fájlokat
async function loadData() {
    try {
        const sources = [
            'MASTER_RAG_FULL.json',
            'MASTER_entities.json',
            'MASTER_relations.json'
        ];

        for (let src of sources) {
            const res = await fetch(src);
            if (res.ok) {
                kbData = kbData.concat(await res.json());
            }
        }
    } catch (e) {
        console.warn("Nem sikerült betölteni a JSON adatokat:", e);
    }
}

// Highlight függvény (kiemeli a találatot)
function highlightText(text, query) {
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(escaped, "gi");
    return text.replace(regex, match => `<span class="highlight">${match}</span>`);
}
