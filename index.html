<!DOCTYPE html><html lang='hu'>
<head><meta charset='UTF-8'><title>Telekom AI KB Portal</title>
<link rel='stylesheet' href='telekom-ui.css'></head>
<body>
<div class='topnav'>Telekom AI Knowledge Base – Portál</div>
<div class='sidebar'>
    
<input type="text" id="searchBox" placeholder="Keresés..." class="search-input" oninput="runSearch(this.value)">
<div id="searchResults" class="search-results"></div>
    <a href='index.html'> Főoldal</a>
    <a href='readmi.html'>Dokumentáció</a>
    <a href='https://github.com/rgt0/Telekom-AI-Knowledge-Base' target='_blank'>GitHub Repo</a>
</div>
<div class='main-content'>
    <div class='btn-container'>
    <a href="https://github.com/rgt0/Telekom-AI-Knowledge-Base" class="github-button" target="_blank">
      Vissza a GitHub oldalra
    </a>
    </div>
    <h1>Üdvözöl a Telekom AI Knowledge Base Portál</h1>
    <p>Válassz a bal oldali menüből modulokat vagy dokumentációs nézetet.</p>
</div>
    <script>
let kbData = [];

async function loadData() {
    try {
        const sources = [
            'MASTER_RAG_FULL.json',
            'MASTER_entities.json',
            'MASTER_relations.json'
        ];

        for (let src of sources) {
            const r = await fetch(src);
            if (r.ok) kbData = kbData.concat(await r.json());
        }
    } catch(e) { console.warn("JSON load error:", e); }
}

function runSearch(query) {
    const box = document.getElementById("searchResults");
    if (!query || query.length < 2) {
        box.innerHTML = "";
        return;
    }

    const q = query.toLowerCase();
    const matches = kbData.filter(i =>
        JSON.stringify(i).toLowerCase().includes(q)
    ).slice(0, 20);

    box.innerHTML = matches.map(m => 
        `<div class='search-item'>
            <strong>${m.chunk_id || m.entity || 'Találat'}</strong><br>
            <small>${JSON.stringify(m).substring(0,150)}...</small>
        </div>`
    ).join("");
}

loadData();
</script>
</body></html>
