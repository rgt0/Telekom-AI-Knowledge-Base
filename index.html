    <script>
let kbData = [];

async function loadData() {
    try {
        const sources = [
            'MASTER_RAG_FULL.json',
            'MASTER_entities.json',
            'MASTER_relations.json'
        ];

        for (let src of sources) {
            const r = await fetch(src);
            if (r.ok) kbData = kbData.concat(await r.json());
        }
    } catch(e) { console.warn("JSON load error:", e); }
}

function runSearch(query) {
    const box = document.getElementById("searchResults");
    if (!query || query.length < 2) {
        box.innerHTML = "";
        return;
    }

    const q = query.toLowerCase();
    const matches = kbData.filter(i =>
        JSON.stringify(i).toLowerCase().includes(q)
    ).slice(0, 20);

    box.innerHTML = matches.map(m => 
        `<div class='search-item'>
            <strong>${m.chunk_id || m.entity || 'Találat'}</strong><br>
            <small>${JSON.stringify(m).substring(0,150)}...</small>
        </div>`
    ).join("");
}

function highlightText(text, query) {
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(escaped, "gi");
    return text.replace(regex, match => `<span class="highlight">${match}</span>`);
}
