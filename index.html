<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>T-AI-KB</title>
    <link rel="stylesheet" href="https://rgt0.github.io/Telekom-AI-Knowledge-Base/telekom-ui.css">
</head>

<body>

<!-- Felső sáv -->
<div class="topnav">
    T‑AI‑KB
</div>

<!-- Oldalsáv -->
<div class="sidebar">

    <input type="text"
           id="searchBox"
           placeholder="Keresés..."
           class="search-input"
           oninput="runSearch(this.value)">

    <div id="searchResults" class="search-results"></div>

    index.htmlFőoldal</a>
    readmi.htmlDokumentáció</a>
    https://github.com/rgt0/Telekom-AI-Knowledge-Base
</div>

<!-- Fő tartalom -->
<div class="main-content">

    <div class="btn-container">
        https://github.com/rgt0/Telekom-AI-Knowledge-Base
            Vissza a GitHub oldalra
        </a>
    </div>

    <h1>T‑AI‑KB – Portál</h1>
    <p>Válassz a bal oldali menüből modulokat vagy dokumentációs nézetet.</p>

</div>

<script>
let kbData = [];

// JSON betöltés
async function loadData() {
    const sources = [
        'MASTER_RAG_FULL.json',
        'MASTER_entities.json',
        'MASTER_relations.json'
    ];

    try {
        for (let src of sources) {
            const res = await fetch(src);
            if (res.ok) kbData = kbData.concat(await res.json());
        }
    } catch (e) {
        console.warn("JSON betöltési hiba:", e);
    }
}

// Highlight
function highlightText(text, query) {
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const regex = new RegExp(escaped, "gi");
    return text.replace(regex,
        m => `<span class="highlight">${m}</span>`);
}

// Keresés
function runSearch(query) {
    const box = document.getElementById("searchResults");

    if (!query || query.length < 2) {
        box.innerHTML = "";
        return;
    }

    const q = query.toLowerCase();

    const matches = kbData.filter(item =>
        JSON.stringify(item).toLowerCase().includes(q)
    ).slice(0, 20);

    box.innerHTML = matches.map(m => {
        const raw = JSON.stringify(m).substring(0, 150);
        const highlighted = highlightText(raw, query);

        return `
            <div class="search-item">
                <strong>${m.chunk_id || m.entity || "Találat"}</strong><br>
                <small>${highlighted}...</small>
            </div>
        `;
    }).join("");
}

// Indítás
loadData();
</script>

</body>
</html>
